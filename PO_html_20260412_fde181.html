<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>外贸PO专业设计工具 | 纯中文/纯英文模板 · 公司Logo · 电子印章 · 打印 · 可读TXT模板</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f4f7fc;
            font-family: 'Inter', sans-serif;
            color: #000000;
            padding: 40px 32px;
            line-height: 1.4;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        .input-panel {
            padding: 28px 32px;
            margin-bottom: 32px;
        }
        .lang-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
            gap: 12px;
        }
        .lang-btn {
            background: #f0f4f9;
            border: 1px solid #ccdae9;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            color: #000;
        }
        .lang-btn.active {
            background: #1f4f2d;
            color: white;
            border-color: #1f4f2d;
        }
        .lang-btn:hover:not(.active) {
            background: #e2e9f2;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: #000000;
            border-left: 4px solid #2b7e3a;
            padding-left: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .two-columns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px 32px;
            margin-bottom: 32px;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-field label {
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #000000;
        }
        .input-field input, .input-field textarea {
            padding: 12px 14px;
            border: 1.5px solid #e2edf2;
            border-radius: 16px;
            font-family: 'Inter', monospace;
            font-size: 0.9rem;
            transition: 0.2s;
            background: #ffffff;
            color: #000000;
        }
        .input-field input:focus, .input-field textarea:focus {
            outline: none;
            border-color: #2b7e3a;
            box-shadow: 0 0 0 3px rgba(43, 126, 58, 0.15);
        }
        .products-section {
            margin: 32px 0 24px;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #eef2f6;
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            color: #000000;
        }
        .product-table th {
            background: #f8fafd;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #000000;
            border-bottom: 1px solid #e4eaf0;
        }
        .product-table td {
            padding: 12px 12px;
            border-bottom: 1px solid #eff3f8;
        }
        .product-table input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #dce5ec;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #000;
        }
        .add-row-btn {
            margin-top: 16px;
            background: #f0f4f9;
            border: 1px dashed #b9cadb;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            color: #000;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .add-row-btn:hover {
            background: #e6f0ea;
            border-color: #2b7e3a;
        }
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #5a6e85;
            border-radius: 40px;
            padding: 6px;
        }
        .btn-icon:hover { color: #c0392b; background: #fee9e7; }
        .logo-upload-section {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 12px 0 16px;
            padding: 12px 16px;
            background: #fafcfe;
            border-radius: 32px;
            border: 1px solid #eef2f8;
        }
        .logo-label {
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-preview {
            width: 60px;
            height: 60px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .logo-actions {
            display: flex;
            gap: 12px;
        }
        .logo-btn {
            background: #eef2fa;
            border: 1px solid #ccdae9;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .logo-btn:hover {
            background: #e2e9f2;
        }
        .seal-settings-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin: 16px 0 20px;
            padding: 12px 0;
            border-top: 1px solid #eef2f8;
            border-bottom: 1px solid #eef2f8;
        }
        .stamp-company-input {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f9fbfe;
            padding: 6px 16px;
            border-radius: 60px;
        }
        .stamp-company-input label {
            font-weight: 500;
            font-size: 0.75rem;
            color: #000;
        }
        .stamp-company-input input {
            border: 1px solid #d0dfea;
            padding: 8px 12px;
            border-radius: 30px;
            width: 220px;
            font-size: 0.8rem;
            color: #000;
        }
        .template-lang-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f8fafd;
            padding: 8px 24px;
            border-radius: 48px;
            margin-right: auto;
        }
        .template-lang-selector span {
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a4d2a;
        }
        .lang-option {
            display: flex;
            gap: 12px;
        }
        .lang-option label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .lang-option input {
            accent-color: #2b7e3a;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            margin-top: 12px;
        }
        .left-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .seal-check {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
        }
        .seal-check input { width: 18px; height: 18px; accent-color: #2b7e3a; }
        .import-btn, .sample-btn, .print-btn {
            background: #eef2fa;
            border: 1px solid #ccdae9;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            color: #000;
        }
        .import-btn:hover, .sample-btn:hover, .print-btn:hover { background: #e2e9f2; }
        .generate-btn {
            background: #1f4f2d;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .generate-btn:hover { background: #0e3a1f; transform: translateY(-1px); }
        .preview-panel {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .preview-header {
            padding: 18px 28px;
            background: #fbfdfe;
            border-bottom: 1px solid #ecf3f8;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            color: #000;
        }
        .preview-content {
            padding: 32px 36px;
            background: white;
            position: relative;
            min-height: 560px;
        }
        /* 打印样式 */
        @media print {
            body * {
                visibility: hidden;
            }
            .preview-panel, .preview-panel * {
                visibility: visible;
            }
            .preview-panel {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                margin: 0;
                padding: 0;
                box-shadow: none;
            }
            .preview-content {
                padding: 0;
            }
            .po-logo-absolute {
                position: absolute;
                top: 20px;
                left: 20px;
            }
            .digital-seal {
                position: absolute;
                bottom: 40px;
                right: 40px;
            }
            .generate-btn, .action-bar, .lang-bar, .input-panel, .preview-header, footer {
                display: none;
            }
        }
        .po-template {
            font-family: 'Inter', sans-serif;
            color: #000000;
            position: relative;
            background: white;
        }
        .po-logo-absolute {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 80px;
            height: auto;
            z-index: 10;
            background: white;
            border-radius: 12px;
            padding: 4px;
        }
        .po-logo-absolute img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        .po-header-centered {
            text-align: center;
            border-bottom: 3px solid #2b7e3a;
            padding-bottom: 20px;
            margin-bottom: 28px;
            margin-top: 20px;
        }
        .po-header-centered h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #1c4d2d;
            margin-bottom: 8px;
        }
        .po-header-centered .po-number {
            font-size: 0.9rem;
            color: #2c3e50;
            font-weight: 500;
            background: #f0f6ef;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 30px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 32px;
            background: #fafcfe;
            padding: 20px 24px;
            border-radius: 24px;
        }
        .info-item p {
            margin: 6px 0;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #000;
        }
        .info-item .label {
            font-weight: 700;
            color: #1a4d2a;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .po-table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 0.8rem;
            color: #000;
        }
        .po-table th {
            background: #eef3f0;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            border-bottom: 2px solid #cbdcd0;
            color: #000;
        }
        .po-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #e4ece6;
            color: #000;
        }
        .total-row {
            font-weight: 700;
            background: #f5f9f6;
        }
        .remark-box {
            margin-top: 28px;
            padding-top: 12px;
            border-top: 1px dashed #cbdcd9;
            font-size: 0.8rem;
            color: #000;
        }
        .digital-seal {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 108px;
            height: 108px;
            border-radius: 50%;
            border: 2px solid #b33e3e;
            background: rgba(210, 70, 70, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', '楷体', serif;
            color: #a03d3d;
            transform: rotate(-6deg);
            pointer-events: none;
            backdrop-filter: blur(1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
            padding: 6px;
        }
        .seal-company {
            font-size: 0.68rem;
            font-weight: 700;
            line-height: 1.2;
            max-width: 90px;
            word-break: break-word;
            color: #a03d3d;
        }
        .seal-star {
            font-size: 1.3rem;
            line-height: 1;
            margin: 4px 0 2px;
            color: #c0392b;
        }
        .seal-sub {
            font-size: 0.55rem;
            opacity: 0.8;
            letter-spacing: 1px;
            color: #a03d3d;
        }
        @media (max-width: 780px) {
            body { padding: 20px; }
            .two-columns { grid-template-columns: 1fr; }
            .preview-content { padding: 20px; }
            .digital-seal { width: 88px; height: 88px; bottom: 20px; right: 20px; }
            .po-logo-absolute { width: 60px; top: 10px; left: 10px; }
        }
        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #4a627a;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="card input-panel">
        <div class="lang-bar">
            <button class="lang-btn active" data-lang="zh">中文界面</button>
            <button class="lang-btn" data-lang="en">English UI</button>
        </div>
        <div class="section-title" id="sectionTitle"><i class="fas fa-file-invoice-dollar"></i> <span>订单核心参数</span></div>
        <div class="two-columns">
            <div class="input-field"><label id="labelPONumber"><i class="fas fa-hashtag"></i> PO编号</label><input type="text" id="poNumber" value="PO-241101-USA"></div>
            <div class="input-field"><label id="labelPODate"><i class="far fa-calendar-alt"></i> 订单日期</label><input type="date" id="poDate" value="2025-03-18"></div>
            <div class="input-field"><label id="labelSupplier"><i class="fas fa-building"></i> 供应商</label><input type="text" id="supplierName" value="Shenzhen Prime Electronics Co., Ltd."></div>
            <div class="input-field"><label id="labelSupplierAddr"><i class="fas fa-map-marker-alt"></i> 供应商地址</label><input type="text" id="supplierAddr" value="Floor 12, Innovation Bldg, Nanshan, Shenzhen, China"></div>
            <div class="input-field"><label id="labelBuyer"><i class="fas fa-user-tie"></i> 买方</label><input type="text" id="buyerName" value="Atlantic Global Trading LLC"></div>
            <div class="input-field"><label id="labelBuyerAddr"><i class="fas fa-location-dot"></i> 买方地址</label><input type="text" id="buyerAddr" value="101 Liberty Avenue, Suite 400, New York, NY 10005"></div>
            <div class="input-field"><label id="labelDelivery"><i class="fas fa-truck-fast"></i> 交付日期</label><input type="date" id="deliveryDate" value="2025-04-20"></div>
            <div class="input-field"><label id="labelPayment"><i class="fas fa-file-signature"></i> 付款条款</label><input type="text" id="paymentTerms" value="T/T 30% deposit, balance against B/L copy"></div>
            <div class="input-field full-width" style="grid-column: span 2;"><label id="labelRemarks"><i class="fas fa-comment-dots"></i> 备注</label><textarea id="remarks" rows="2">Please ensure compliance with RoHS. Packing list required. Ship via sea freight.</textarea></div>
        </div>
        <div class="products-section">
            <div class="section-title" style="margin-bottom: 12px;" id="productSectionTitle"><i class="fas fa-boxes"></i> <span>产品明细</span></div>
            <div class="table-wrapper">
                <table class="product-table">
                    <thead id="productTableHead">
                        <tr><th id="thCode">产品编码</th><th id="thDesc">产品描述</th><th id="thQty">数量</th><th id="thPrice">单价(美元)</th><th id="thAmount">总价(美元)</th><th style="width:40px"></th></tr>
                    </thead>
                    <tbody id="productTbody"></tbody>
                </table>
            </div>
            <button type="button" class="add-row-btn" id="addRowBtn"><i class="fas fa-plus-circle"></i> <span id="addRowText">添加产品行</span></button>
        </div>
        <div class="logo-upload-section">
            <div class="logo-label"><i class="fas fa-image"></i> <span id="logoLabel">公司Logo</span></div>
            <div class="logo-preview" id="logoPreview"><img id="logoPreviewImg" src="" alt="Logo" style="display: none;"></div>
            <div class="logo-actions">
                <label class="logo-btn" for="logoUpload"><i class="fas fa-upload"></i> <span id="uploadLogoText">上传图片</span></label>
                <input type="file" id="logoUpload" accept="image/png, image/jpeg, image/jpg, image/svg+xml" style="display: none;">
                <button class="logo-btn" id="clearLogoBtn"><i class="fas fa-trash-alt"></i> <span id="clearLogoText">清除</span></button>
            </div>
            <span style="font-size: 0.7rem; color: #5a6e85;" id="logoHint">推荐尺寸 80x80px，将显示在订单左上角</span>
        </div>
        <div class="seal-settings-row">
            <div class="stamp-company-input">
                <i class="fas fa-stamp" style="color:#a03d3d;"></i>
                <label id="stampLabel">印章公司名</label>
                <input type="text" id="stampCompanyName" placeholder="自动使用买方公司名">
                <span style="font-size:0.7rem; color:#5a6e85;" id="stampHint">★ 将显示五角星</span>
            </div>
        </div>
        <div class="template-lang-selector">
            <span><i class="fas fa-language"></i> <span id="templateLangLabel">生成模板语言</span></span>
            <div class="lang-option">
                <label><input type="radio" name="templateLang" value="zh" checked> <span id="optChinese">全部中文</span></label>
                <label><input type="radio" name="templateLang" value="en"> <span id="optEnglish">全部英文</span></label>
            </div>
        </div>
        <div class="action-bar">
            <div class="left-actions">
                <div class="seal-check"><i class="fas fa-stamp"></i><label for="sealToggle" id="sealToggleLabel">生成电子印章</label><input type="checkbox" id="sealToggle" checked></div>
                <label class="import-btn" for="txtImportFile" id="importBtnLabel"><i class="fas fa-upload"></i> 导入TXT模板</label>
                <input type="file" id="txtImportFile" accept=".txt" style="display:none;">
                <button class="sample-btn" id="sampleDownloadBtn"><i class="fas fa-download"></i> 下载TXT模板</button>
                <button class="print-btn" id="printBtn"><i class="fas fa-print"></i> 打印订单</button>
            </div>
            <button class="generate-btn" id="generateBtn"><i class="fas fa-magic"></i> <span id="generateBtnText">生成专业PO模板</span></button>
        </div>
    </div>
    <div class="preview-panel">
        <div class="preview-header"><span id="previewTitle"><i class="far fa-eye"></i> 采购订单实时预览</span><span style="font-size:0.7rem;" id="previewBadge">电子印章支持公司名+★</span></div>
        <div class="preview-content" id="previewArea"><div class="po-template" style="text-align:center; color:#9aaebf;" id="placeholderText">点击「生成专业PO模板」展示订单</div></div>
    </div>
    <footer id="footerText">© 外贸PO专家 | 界面中英文可切换 | 模板可选纯中文/纯英文 | 支持公司Logo | 电子印章 | 可读TXT模板 | 打印</footer>
</div>
<script>
    // 界面多语言
    const uiTexts = {
        zh: {
            sectionTitle: "订单核心参数", labelPONumber: "PO编号", labelPODate: "订单日期", labelSupplier: "供应商", labelSupplierAddr: "供应商地址",
            labelBuyer: "买方", labelBuyerAddr: "买方地址", labelDelivery: "交付日期", labelPayment: "付款条款", labelRemarks: "备注",
            productSectionTitle: "产品明细", thCode: "产品编码", thDesc: "产品描述", thQty: "数量", thPrice: "单价(美元)", thAmount: "总价(美元)",
            addRowText: "添加产品行", logoLabel: "公司Logo", uploadLogoText: "上传图片", clearLogoText: "清除", logoHint: "推荐尺寸 80x80px，将显示在订单左上角",
            stampLabel: "印章公司名", stampHint: "★ 将显示五角星", sealToggleLabel: "生成电子印章", importBtnLabel: "导入TXT模板",
            downloadBtnLabel: "下载TXT模板", generateBtnText: "生成专业PO模板", templateLangLabel: "生成模板语言", optChinese: "全部中文", optEnglish: "全部英文",
            previewTitle: "采购订单实时预览", previewBadge: "电子印章支持公司名+★", placeholderText: "点击「生成专业PO模板」展示订单", footerText: "© 外贸PO专家 | 界面中英文可切换 | 模板可选纯中文/纯英文 | 支持公司Logo | 电子印章 | 可读TXT模板 | 打印"
        },
        en: {
            sectionTitle: "Order Core Parameters", labelPONumber: "PO Number", labelPODate: "Order Date", labelSupplier: "Supplier", labelSupplierAddr: "Supplier Address",
            labelBuyer: "Buyer", labelBuyerAddr: "Buyer Address", labelDelivery: "Delivery Date", labelPayment: "Payment Terms", labelRemarks: "Remarks",
            productSectionTitle: "Product Line Items", thCode: "Product Code", thDesc: "Description", thQty: "Qty", thPrice: "Unit Price (USD)", thAmount: "Amount (USD)",
            addRowText: "Add Product Item", logoLabel: "Company Logo", uploadLogoText: "Upload Image", clearLogoText: "Clear", logoHint: "Recommended 80x80px, appears at top-left",
            stampLabel: "Seal Company Name", stampHint: "★ Shows a star", sealToggleLabel: "Add Electronic Seal", importBtnLabel: "Import TXT Template",
            downloadBtnLabel: "Download TXT Template", generateBtnText: "Generate PO", templateLangLabel: "Template Language", optChinese: "Chinese Only", optEnglish: "English Only",
            previewTitle: "Purchase Order Live Preview", previewBadge: "Seal supports company name + ★", placeholderText: "Click 'Generate PO' to display order", footerText: "© PO Expert | Switchable UI | CN/EN Template | Logo Support | E-Seal | Readable TXT | Print"
        }
    };
    let currentUILang = 'zh';
    let currentLogoDataUrl = null;
    function updateUILanguage() {
        const t = uiTexts[currentUILang];
        document.getElementById('sectionTitle').innerHTML = `<i class="fas fa-file-invoice-dollar"></i> <span>${t.sectionTitle}</span>`;
        document.getElementById('labelPONumber').innerHTML = `<i class="fas fa-hashtag"></i> ${t.labelPONumber}`;
        document.getElementById('labelPODate').innerHTML = `<i class="far fa-calendar-alt"></i> ${t.labelPODate}`;
        document.getElementById('labelSupplier').innerHTML = `<i class="fas fa-building"></i> ${t.labelSupplier}`;
        document.getElementById('labelSupplierAddr').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${t.labelSupplierAddr}`;
        document.getElementById('labelBuyer').innerHTML = `<i class="fas fa-user-tie"></i> ${t.labelBuyer}`;
        document.getElementById('labelBuyerAddr').innerHTML = `<i class="fas fa-location-dot"></i> ${t.labelBuyerAddr}`;
        document.getElementById('labelDelivery').innerHTML = `<i class="fas fa-truck-fast"></i> ${t.labelDelivery}`;
        document.getElementById('labelPayment').innerHTML = `<i class="fas fa-file-signature"></i> ${t.labelPayment}`;
        document.getElementById('labelRemarks').innerHTML = `<i class="fas fa-comment-dots"></i> ${t.labelRemarks}`;
        document.getElementById('productSectionTitle').innerHTML = `<i class="fas fa-boxes"></i> <span>${t.productSectionTitle}</span>`;
        document.getElementById('thCode').innerText = t.thCode;
        document.getElementById('thDesc').innerText = t.thDesc;
        document.getElementById('thQty').innerText = t.thQty;
        document.getElementById('thPrice').innerText = t.thPrice;
        document.getElementById('thAmount').innerText = t.thAmount;
        document.getElementById('addRowText').innerText = t.addRowText;
        document.getElementById('logoLabel').innerHTML = `<i class="fas fa-image"></i> ${t.logoLabel}`;
        document.getElementById('uploadLogoText').innerText = t.uploadLogoText;
        document.getElementById('clearLogoText').innerText = t.clearLogoText;
        document.getElementById('logoHint').innerText = t.logoHint;
        document.getElementById('stampLabel').innerHTML = t.stampLabel;
        document.getElementById('stampHint').innerText = t.stampHint;
        document.getElementById('sealToggleLabel').innerHTML = t.sealToggleLabel;
        document.getElementById('importBtnLabel').innerHTML = `<i class="fas fa-upload"></i> ${t.importBtnLabel}`;
        document.getElementById('sampleDownloadBtn').innerHTML = `<i class="fas fa-download"></i> ${t.downloadBtnLabel}`;
        document.getElementById('generateBtnText').innerText = t.generateBtnText;
        document.getElementById('templateLangLabel').innerHTML = `<i class="fas fa-language"></i> ${t.templateLangLabel}`;
        document.getElementById('optChinese').innerText = t.optChinese;
        document.getElementById('optEnglish').innerText = t.optEnglish;
        document.getElementById('previewTitle').innerHTML = `<i class="far fa-eye"></i> ${t.previewTitle}`;
        document.getElementById('previewBadge').innerText = t.previewBadge;
        document.getElementById('placeholderText').innerText = t.placeholderText;
        document.getElementById('footerText').innerText = t.footerText;
    }
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentUILang = btn.getAttribute('data-lang');
            updateUILanguage();
        });
    });
    // Logo 处理
    const logoUpload = document.getElementById('logoUpload');
    const logoPreviewImg = document.getElementById('logoPreviewImg');
    const clearLogoBtn = document.getElementById('clearLogoBtn');
    logoUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = ev => { currentLogoDataUrl = ev.target.result; logoPreviewImg.src = currentLogoDataUrl; logoPreviewImg.style.display = 'block'; renderPreview(); };
            reader.readAsDataURL(file);
        } else alert(currentUILang === 'zh' ? '请选择有效的图片文件' : 'Please select a valid image');
    });
    clearLogoBtn.addEventListener('click', () => { currentLogoDataUrl = null; logoPreviewImg.src = ''; logoPreviewImg.style.display = 'none'; logoUpload.value = ''; renderPreview(); });
    // 产品表格
    const productTbody = document.getElementById('productTbody');
    const addRowBtn = document.getElementById('addRowBtn');
    function updateRowTotal(row) {
        const qty = parseFloat(row.querySelector('.qty-input')?.value) || 0;
        const price = parseFloat(row.querySelector('.price-input')?.value) || 0;
        const totalSpan = row.querySelector('.row-total');
        if (totalSpan) totalSpan.textContent = (qty * price).toFixed(2);
    }
    function bindRowEvents(row) {
        const qty = row.querySelector('.qty-input'), price = row.querySelector('.price-input'), del = row.querySelector('.del-row-btn');
        if (qty) qty.addEventListener('input', () => updateRowTotal(row));
        if (price) price.addEventListener('input', () => updateRowTotal(row));
        if (del) del.addEventListener('click', () => row.remove());
    }
    function createProductRow(prod = { code: '', desc: '', qty: 1, price: 0 }) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="prod-code" value="${escapeHtml(prod.code)}" placeholder="SKU-001"></td>
            <td><input type="text" class="prod-desc" value="${escapeHtml(prod.desc)}" placeholder="Product name"></td>
            <td><input type="number" step="1" min="0" class="qty-input" value="${prod.qty || 1}" style="width:90px"></td>
            <td><input type="number" step="0.01" min="0" class="price-input" value="${prod.price || 0}" style="width:110px"></td>
            <td><span class="row-total">${((prod.qty||0)*(prod.price||0)).toFixed(2)}</span></td>
            <td><button type="button" class="btn-icon del-row-btn"><i class="fas fa-trash-alt"></i></button></td>
        `;
        bindRowEvents(tr);
        updateRowTotal(tr);
        return tr;
    }
    function initSampleProducts() {
        productTbody.innerHTML = '';
        const samples = [{ code: 'MB-1001', desc: 'Wireless Mouse Pro', qty: 200, price: 12.50 }, { code: 'KB-202', desc: 'Mechanical Keyboard RGB', qty: 120, price: 45.00 }, { code: 'USB-C-3M', desc: 'USB-C to C Braided Cable', qty: 500, price: 3.20 }];
        samples.forEach(s => productTbody.appendChild(createProductRow(s)));
    }
    initSampleProducts();
    addRowBtn.addEventListener('click', () => productTbody.appendChild(createProductRow({ code: '', desc: '', qty: 1, price: 0 })));
    function getProductsFromTable() {
        const rows = productTbody.querySelectorAll('tr');
        const products = [];
        for (let row of rows) {
            const code = row.querySelector('.prod-code')?.value || '';
            const desc = row.querySelector('.prod-desc')?.value || '';
            const qty = parseFloat(row.querySelector('.qty-input')?.value) || 0;
            const price = parseFloat(row.querySelector('.price-input')?.value) || 0;
            if (code.trim() !== '' || desc.trim() !== '' || qty > 0) products.push({ code, desc, qty, price });
        }
        return products;
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function getFormParams() {
        return {
            poNumber: document.getElementById('poNumber').value.trim() || 'PO-UNKNOWN',
            poDate: document.getElementById('poDate').value,
            supplierName: document.getElementById('supplierName').value.trim(),
            supplierAddr: document.getElementById('supplierAddr').value.trim(),
            buyerName: document.getElementById('buyerName').value.trim(),
            buyerAddr: document.getElementById('buyerAddr').value.trim(),
            deliveryDate: document.getElementById('deliveryDate').value,
            paymentTerms: document.getElementById('paymentTerms').value.trim(),
            remarks: document.getElementById('remarks').value.trim()
        };
    }
    function generatePOHtml(products, params, withSeal, stampCompanyRaw, templateLang, logoDataUrl) {
        const subtotal = products.reduce((sum, p) => sum + (p.qty * p.price), 0);
        const totalUSD = subtotal;
        const orderDateFormatted = params.poDate ? new Date(params.poDate).toLocaleDateString(templateLang === 'zh' ? 'zh-CN' : 'en-US') : params.poDate;
        const deliveryDateFormatted = params.deliveryDate ? new Date(params.deliveryDate).toLocaleDateString(templateLang === 'zh' ? 'zh-CN' : 'en-US') : params.deliveryDate;
        let sealCompany = stampCompanyRaw.trim();
        if (withSeal && !sealCompany) sealCompany = params.buyerName || "Global Trading";
        let sealDisplayName = sealCompany.length > 24 ? sealCompany.substring(0,20)+"..." : sealCompany;
        let productRows = '';
        products.forEach(prod => {
            const totalPrice = (prod.qty * prod.price).toFixed(2);
            productRows += `<tr><td style="text-align:center;">${escapeHtml(prod.code)}</td><td style="text-align:left;">${escapeHtml(prod.desc)}</td><td style="text-align:center;">${prod.qty.toFixed(0)}</td><td style="text-align:center;">$${prod.price.toFixed(2)}</td><td style="text-align:center;">$${totalPrice}</td></tr>`;
        });
        if(products.length === 0) productRows = `<tr><td colspan="5" style="text-align:center;">${templateLang === 'zh' ? '暂无产品' : 'No products'}</td></tr>`;
        const sealHtml = withSeal ? `<div class="digital-seal"><div class="seal-company">${escapeHtml(sealDisplayName)}</div><div class="seal-star">★</div><div class="seal-sub">${templateLang === 'zh' ? '电子印章' : 'E-Seal'}</div></div>` : '';
        const logoHtml = (logoDataUrl && logoDataUrl !== '') ? `<div class="po-logo-absolute"><img src="${logoDataUrl}" alt="Logo"></div>` : '';
        if (templateLang === 'zh') {
            return `<div class="po-template" style="position: relative;">${logoHtml}${sealHtml}<div class="po-header-centered"><h1>采购订单</h1><div class="po-number">订单编号: ${escapeHtml(params.poNumber)}</div></div><div class="info-grid"><div class="info-item"><p><span class="label">供应商</span><br>${escapeHtml(params.supplierName)}<br>${escapeHtml(params.supplierAddr)}</p></div><div class="info-item"><p><span class="label">买方</span><br>${escapeHtml(params.buyerName)}<br>${escapeHtml(params.buyerAddr)}</p></div><div class="info-item"><p><span class="label">订单日期</span><br>${orderDateFormatted}</p><p><span class="label">交付日期</span><br>${deliveryDateFormatted}</p></div><div class="info-item"><p><span class="label">付款条款</span><br>${escapeHtml(params.paymentTerms)}</p></div></div><table class="po-table"><thead><tr><th>产品编码</th><th>产品描述</th><th>数量</th><th>单价(美元)</th><th>总价(美元)</th></tr></thead><tbody>${productRows}<tr class="total-row"><td colspan="4" style="text-align:right; font-weight:700;">总计金额 (美元)</td><td style="font-weight:800;">$${totalUSD.toFixed(2)}</td></tr></tbody></table><div class="remark-box"><strong>备注：</strong><br>${escapeHtml(params.remarks) || '无'}</div><div style="margin-top:20px; font-size:0.7rem; border-top:1px solid #e2e8f0; padding-top:12px; display:flex; justify-content:space-between;"><span>授权签字: ___________________</span><span>日期: ${new Date().toLocaleDateString('zh-CN')}</span></div></div>`;
        } else {
            return `<div class="po-template" style="position: relative;">${logoHtml}${sealHtml}<div class="po-header-centered"><h1>PURCHASE ORDER</h1><div class="po-number">PO Number: ${escapeHtml(params.poNumber)}</div></div><div class="info-grid"><div class="info-item"><p><span class="label">Supplier</span><br>${escapeHtml(params.supplierName)}<br>${escapeHtml(params.supplierAddr)}</p></div><div class="info-item"><p><span class="label">Buyer</span><br>${escapeHtml(params.buyerName)}<br>${escapeHtml(params.buyerAddr)}</p></div><div class="info-item"><p><span class="label">Order Date</span><br>${orderDateFormatted}</p><p><span class="label">Delivery Date</span><br>${deliveryDateFormatted}</p></div><div class="info-item"><p><span class="label">Payment Terms</span><br>${escapeHtml(params.paymentTerms)}</p></div></div><table class="po-table"><thead><tr><th>Product Code</th><th>Description</th><th>Qty</th><th>Unit Price (USD)</th><th>Amount (USD)</th></tr></thead><tbody>${productRows}<tr class="total-row"><td colspan="4" style="text-align:right; font-weight:700;">Total Amount (USD)</td><td style="font-weight:800;">$${totalUSD.toFixed(2)}</td></tr></tbody></table><div class="remark-box"><strong>Remarks:</strong><br>${escapeHtml(params.remarks) || 'None'}</div><div style="margin-top:20px; font-size:0.7rem; border-top:1px solid #e2e8f0; padding-top:12px; display:flex; justify-content:space-between;"><span>Authorized Signature: ___________________</span><span>Date: ${new Date().toLocaleDateString('en-US')}</span></div></div>`;
        }
    }
    function renderPreview() {
        const params = getFormParams();
        const products = getProductsFromTable();
        const withSeal = document.getElementById('sealToggle').checked;
        const stampCompany = document.getElementById('stampCompanyName').value;
        const templateLang = document.querySelector('input[name="templateLang"]:checked').value;
        const html = generatePOHtml(products, params, withSeal, stampCompany, templateLang, currentLogoDataUrl);
        document.getElementById('previewArea').innerHTML = html;
    }
    const langRadios = document.querySelectorAll('input[name="templateLang"]');
    langRadios.forEach(radio => { radio.addEventListener('change', renderPreview); });
    document.getElementById('generateBtn').addEventListener('click', renderPreview);
    // 打印功能
    document.getElementById('printBtn').addEventListener('click', () => { window.print(); });
    // 下载可读TXT模板 (人类友好格式，无代码标记)
    function downloadReadableTemplate() {
        const templateContent = `采购订单模板 (请修改冒号后的内容，产品行可增删)
==================================================
PO编号：_________________________
订单日期：_______________________ (格式 YYYY-MM-DD)
供应商：_________________________
供应商地址：_____________________
买方：___________________________
买方地址：_______________________
交付日期：_______________________ (格式 YYYY-MM-DD)
付款条款：_______________________
备注：___________________________
印章公司名：_____________________ (留空则自动使用买方名称)
生成电子印章：是/否 (填写 是 或 否)
生成模板语言：zh/en (zh=中文, en=英文)

产品明细：
产品编码 | 产品描述 | 数量 | 单价(USD)
_________|__________|______|__________
(示例) A001 | 示例产品 | 100 | 9.99
`;
        const blob = new Blob([templateContent], {type: "text/plain;charset=utf-8"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "po_template_readable.txt";
        a.click();
        URL.revokeObjectURL(a.href);
    }
    document.getElementById('sampleDownloadBtn').addEventListener('click', downloadReadableTemplate);
    // 导入TXT模板（支持上述可读格式以及原有键值格式）
    document.getElementById('txtImportFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const content = ev.target.result;
                const lines = content.split(/\r?\n/);
                let params = {};
                let products = [];
                let inProducts = false;
                for(let line of lines) {
                    line = line.trim();
                    if(line === '' || line.startsWith('=') || line.startsWith('采购订单模板') || line.startsWith('================================')) continue;
                    if(line.includes('产品明细：') || line.includes('产品明细')) { inProducts = true; continue; }
                    if(inProducts && line.includes('|')) {
                        let parts = line.split('|');
                        if(parts.length >= 4 && !parts[0].includes('产品编码')) {
                            let code = parts[0].trim();
                            let desc = parts[1].trim();
                            let qty = parseFloat(parts[2].trim());
                            let price = parseFloat(parts[3].trim());
                            if(!isNaN(qty) && !isNaN(price) && code !== '') products.push({ code, desc, qty, price });
                        }
                        continue;
                    }
                    let colonIndex = line.indexOf('：');
                    if(colonIndex === -1) colonIndex = line.indexOf(':');
                    if(colonIndex > 0) {
                        let key = line.substring(0, colonIndex).trim();
                        let val = line.substring(colonIndex+1).trim().replace(/^_+/, '').replace(/_+$/, '');
                        if(key.includes('PO编号')) params.po_number = val;
                        else if(key.includes('订单日期')) params.po_date = val;
                        else if(key.includes('供应商') && !key.includes('地址')) params.supplier_name = val;
                        else if(key.includes('供应商地址')) params.supplier_address = val;
                        else if(key.includes('买方') && !key.includes('地址')) params.buyer_name = val;
                        else if(key.includes('买方地址')) params.buyer_address = val;
                        else if(key.includes('交付日期')) params.delivery_date = val;
                        else if(key.includes('付款条款')) params.payment_terms = val;
                        else if(key.includes('备注')) params.remarks = val;
                        else if(key.includes('印章公司名')) params.stamp_company = val;
                        else if(key.includes('生成电子印章')) { params.with_seal = (val === '是' || val === 'true') ? 'true' : 'false'; }
                        else if(key.includes('生成模板语言')) { params.template_lang = (val === 'zh' ? 'zh' : 'en'); }
                    }
                }
                if(params.po_number) document.getElementById('poNumber').value = params.po_number;
                if(params.po_date) document.getElementById('poDate').value = params.po_date;
                if(params.supplier_name) document.getElementById('supplierName').value = params.supplier_name;
                if(params.supplier_address) document.getElementById('supplierAddr').value = params.supplier_address;
                if(params.buyer_name) document.getElementById('buyerName').value = params.buyer_name;
                if(params.buyer_address) document.getElementById('buyerAddr').value = params.buyer_address;
                if(params.delivery_date) document.getElementById('deliveryDate').value = params.delivery_date;
                if(params.payment_terms) document.getElementById('paymentTerms').value = params.payment_terms;
                if(params.remarks) document.getElementById('remarks').value = params.remarks;
                if(params.stamp_company) document.getElementById('stampCompanyName').value = params.stamp_company;
                if(params.with_seal === 'true') document.getElementById('sealToggle').checked = true;
                else if(params.with_seal === 'false') document.getElementById('sealToggle').checked = false;
                if(params.template_lang === 'zh' || params.template_lang === 'en') document.querySelector(`input[name="templateLang"][value="${params.template_lang}"]`).checked = true;
                if(products.length > 0) {
                    productTbody.innerHTML = '';
                    products.forEach(p => productTbody.appendChild(createProductRow(p)));
                }
                alert(currentUILang === 'zh' ? "✅ TXT模板导入成功！" : "✅ TXT template imported!");
                renderPreview();
            } catch(err) {
                alert(currentUILang === 'zh' ? "❌ 解析失败，请检查TXT格式是否符合模板规范" : "❌ Parse error, please check TXT format");
            }
        };
        reader.readAsText(file, 'UTF-8');
        e.target.value = '';
    });
    updateUILanguage();
    renderPreview();
</script>
